version: "3.9"

services:
  api:
    build: .
    container_name: sentinel-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  dashboard:
    image: python:3.11-slim
    container_name: sentinel-ui
    working_dir: /app
    command: >
      bash -c "pip install -q streamlit plotly pandas requests evidently &&
               streamlit run src/ui/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
    restart: unless-stopped
