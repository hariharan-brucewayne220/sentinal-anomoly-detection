name: Sentinel CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.4.7

      - name: Run ruff
        run: ruff check src/ tests/

  # ── Job 2: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt httpx

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Job 3: Docker Build & Smoke Test ────────────────────────────────────────
  build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t sentinel:${{ github.sha }} .

      - name: Run smoke test
        run: |
          docker run -d --name sentinel-smoke -p 8000:8000 sentinel:${{ github.sha }}
          sleep 8
          curl -f http://localhost:8000/health
          docker stop sentinel-smoke

      - name: Log in to Docker Hub (on main push only)
        if: |
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push' &&
          secrets.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub (on main push only)
        if: |
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push' &&
          secrets.DOCKERHUB_USERNAME != ''
        run: |
          docker tag sentinel:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/sentinel:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sentinel:latest
